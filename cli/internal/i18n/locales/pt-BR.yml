audit.prefix_stop: "✋🏽Parar: %s"
audit.prefix_warning: "⚠️ Aviso: %s"

audit.block_skill_read_first: "Tentou modificar '%s' sem ler o SKILL.md primeiro. Leia ~/.claude/skills/%s/SKILL.md antes de continuar."

audit.warn_team_no_execution_read: "Criando equipe '%s' sem ler o team-execution.md primeiro. Leia ~/.claude/references/plan/team-execution.md para a estratégia de delegação."
audit.warn_standalone_tasks: "Chamada Task avulsa #%d nesta sessão — NENHUM TeamCreate detectado. team-execution.md exige TeamCreate para 3+ tarefas. Você disse que usaria equipes. Mentiu?"

audit.warn_merge_without_ask: "Segundo gh pr merge durante /finish sem AskUserQuestion. O Passo 6 exige perguntar ao usuário antes de mesclar homolog → main."
audit.warn_pr_create_outside_context: "gh pr create chamado fora do contexto /pr, /finish ou /hotfix. PRs devem ser criados apenas por essas skills. Contexto ativo: '%s'"

audit.block_plan_no_template: "Criando novo arquivo de plano sem ler o plan-template.md primeiro.\nLeia ~/.claude/references/plan/plan-template.md antes de criar planos."

audit.block_workflow_no_homolog: "Criando '%s' mas este projeto não tem branch homolog.\n\nWorkflows do GitHub (claude.yml, tests.yml) são apenas para projetos que usam\no fluxo PR homolog → main. Sem homolog, não há pipeline de PR para executar CI.\n\nSe este projeto deve usar o fluxo homolog, crie o branch homolog primeiro:\n  git checkout -b homolog && git push -u origin homolog"

audit.block_test_not_parallel: "Forma errada de executar o conjunto completo de testes.\n\nVocê DEVE executá-lo em paralelo com 10 processos — caso contrário leva 40+ minutos:\n\n  Conjunto completo:  ./vendor/bin/pest --parallel --processes=10\n  Com cobertura:      herd coverage ./vendor/bin/pest --coverage --parallel --processes=10\n\nDisponíveis como aliases de shell:\n  ptp   →  ./vendor/bin/pest --parallel --processes=10\n  tcq   →  herd coverage ./vendor/bin/pest --coverage --parallel --processes=10\n\nTestes direcionados (sempre preferidos por velocidade):\n  vendor/bin/pest --filter=\"TestName\"\n  vendor/bin/pest tests/Feature/Path/ToTest.php\n  herd coverage vendor/bin/pest --coverage --filter=\"TestName\""

audit.warn_task_deletion_edit: "🚨 EXCLUSÃO DE TAREFA DO PLANO DETECTADA: %d tarefa(s) não concluída(s) removida(s) de '%s'.\n   Antes: %d tarefas (%d não concluídas) → Depois: %d tarefas (%d não concluídas)\n   Você DEVE implementar as tarefas planejadas, não excluí-las. Se uma tarefa não for mais necessária, marque-a como [x] IGNORADA com motivo.\n   Confiar mas VERIFICAR — esta edição parece omissão deliberada."
audit.warn_task_deletion_write: "🚨 EXCLUSÃO DE TAREFA DO PLANO DETECTADA: %d tarefa(s) desapareceu de '%s'.\n   Antes: %d tarefas (%d não concluídas) → Depois: %d tarefas (%d não concluídas)\n   %d tarefa(s) não concluída(s) foram removidas — estas devem ser implementadas, não excluídas.\n   Se as tarefas realmente não forem necessárias, marque-as como [x] IGNORADAS com motivo."

audit.block_migrate_fresh: "migrate:fresh está BLOQUEADO — ele descarta todas as tabelas e destrói dados.\nUse 'php artisan migrate' para migrações normais.\n\nSe precisar de migrate:fresh para consolidação de migrações, invoque /squash-migrations primeiro.\nEssa skill desbloqueia o migrate:fresh para a sessão.\n\nSe realmente precisar fora desse contexto, peça ao usuário para executar manualmente."
audit.warn_migrate_fresh_allowed: "migrate:fresh PERMITIDO — skill /squash-migrations está ativa.\nIsso é esperado durante a consolidação de migrações. Prossiga com cautela."
audit.warn_migrate_fresh_deployed: "AVISO: migrate:fresh em um projeto implantado. Prossiga com extrema cautela."
audit.block_destructive_db: "%s está BLOQUEADO — este projeto tem env.deployed: true em .bravros.yml.\nComandos destrutivos de banco de dados não são permitidos em projetos implantados.\nSe realmente necessário, peça ao usuário para executar manualmente ou defina env.deployed: false."
audit.block_push_main: "Push direto para main está BLOQUEADO.\nUse o fluxo de branch: feature/* → %s → main (via PR).\nEm emergência, use /hotfix que cria um PR adequado."
audit.block_ai_sig_commit: "Assinaturas de IA estão BLOQUEADAS em commits.\nRemova qualquer Co-Authored-By, 'Generated by AI' ou atribuição similar.\nO hook commit-msg também rejeitará essas mensagens, mas é melhor detectar cedo."
audit.block_ai_sig_pr: "Assinaturas de IA estão BLOQUEADAS em pull requests.\nRemova qualquer 'Generated with Claude Code', 'Co-Authored-By', '🤖 Generated',\nou qualquer atribuição de IA do título e corpo do PR.\nPadrão encontrado: %s"
audit.block_ai_sig_comment: "Assinaturas de IA estão BLOQUEADAS em comentários de PR.\nRemova qualquer atribuição de IA do corpo do comentário.\nPadrão encontrado: %s"

audit.block_review_too_short: "Comentário @claude review muito curto — agentes devem usar o prompt completo.\n\nCorpo do comentário obrigatório:\n  \"@claude review this PR and check if we are able to merge. Analyze the code changes for any issues, security concerns, or improvements needed.\"\n\nIsso garante que o revisor de CI realize uma análise completa, não superficial."

audit.block_plan_check_skip: "Criação de PR sem /plan-check.\n\nVocê está dentro de um fluxo SDLC — /plan-check é obrigatório antes de criar um PR.\nExecute /plan-check primeiro para auditar a implementação contra o plano.\n\nSe for trabalho ad-hoc (sem plano), use /pr diretamente fora dos fluxos SDLC."
audit.warn_plan_check_skip: "Criando PR após /plan-approved mas /plan-check nunca foi executado.\n/plan-check é o portão de qualidade — audita código vs plano, encontra testes órfãos\ne cria o commit de auditoria. Execute /plan-check antes de /pr."

audit.block_unchecked_acceptance: "Critérios de aceitação não verificados no arquivo de plano.\n\nSeu plano tem %d/%d itens não verificados na seção de Aceitação de '%s'.\nExecute /plan-check para auditar e marcar os critérios de aceitação concluídos."
audit.warn_unchecked_acceptance: "PR tem %d/%d critérios de aceitação não verificados em '%s'.\n/plan-check deve verificar e marcar cada critério antes de criar o PR.\nExecute /plan-check ou verifique e marque manualmente os critérios de aceitação."

audit.block_autopr_skip_plancheck: "auto-pr: Criando PR sem executar o Passo 5 (plan-check).\n\nO pipeline auto-pr requer TODOS os passos em ordem:\n  1. Inicializar → 2. Plano → 3. Revisar → 4. Executar → 5. Verificar Plano → 6. PR → 7. Loop de Revisão → 8. Relatório\n\nVocê pulou o Passo 5 (auditando implementação). Execute agora:\n  echo \"🤖 [auto-pr:5] auditando implementação\"\n  bravros context --diffs\n  # ... compare plano vs implementação, corrija discrepâncias\n  bravros sync"
audit.warn_autopr_skip_review: "auto-pr: Publicando relatório final sem executar o Passo 7 (loop de revisão).\n\nO loop de revisão é obrigatório — acione @claude review no PR:\n  echo \"🤖 [auto-pr:7] iniciando loop de revisão\"\n  gh pr comment $PR_NUM --body \"@claude review this PR\"\n\nSe a GitHub Action não estiver configurada, aguarde 5 min e continue.\nVocê DEVE ao menos tentar o passo de revisão."

audit.block_backlog_manual: "Análise manual de arquivo de backlog está BLOQUEADA.\n\nUse o CLI — ele lida corretamente com formatos YAML e legado:\n\n  bravros backlog                  # Saída JSON (padrão)\n  bravros backlog --format table   # Tabela formatada\n  bravros backlog --archive        # Incluir itens arquivados\n  bravros backlog migrate           # Converter formato antigo → YAML\n\nNunca analise arquivos de backlog com grep/sed/awk/cat — o CLI é mais rápido e correto."

audit.block_planning_mv: "Use 'git mv' em vez de 'mv' para arquivos .planning/ para preservar o histórico do git"

audit.block_main_merge_autonomous: "Mesclar para main NÃO é permitido no modo autônomo.\n\nPipelines autônomos (/auto-pr, /auto-pr-wt, /auto-merge) podem mesclar para\nqualquer branch EXCETO main. Mesclagens para main requerem aprovação humana via /finish.\n\nO que você deve fazer:\n  1. Criar o PR apontando para main (permitido)\n  2. Postar um comentário de recomendação no PR\n  3. Parar e deixar o usuário executar /finish para mesclar\n\nMain é sempre decisão do usuário. Isso é inegociável."
audit.block_main_merge: "Mesclar para main está BLOQUEADO fora dos contextos de skill permitidos.\n\nContextos permitidos: /finish, /hotfix\n\nPara mesclar para main:\n  1. Use /finish para concluir a feature e mesclar via PR\n  2. Use /hotfix para implantações de emergência\n\nBranch de staging: %s\nEste portão previne mesclagens não autorizadas para produção."

audit.warn_no_config: "Nenhum .bravros.yml encontrado neste projeto.\n\nExecute: bravros detect-stack --write\n\nIsso detecta automaticamente sua stack e gera .bravros.yml com o esquema completo:\n  staging_branch, stack (language, framework, test_runner, has_assets),\n  git (remote, has_ci, ci_workflow), env (deployed, production, staging, local).\n\nTodas as skills e regras de auditoria leem deste arquivo — gerá-lo uma vez evita\ndetecção repetida de stack e habilita proteções de ambiente implantado."

audit.block_agent_no_model: "Agent despachando tarefas do plano sem o parâmetro model: definido.\n\nMarcadores de tarefa encontrados no prompt: %s\nModelo necessário: '%s'\n\nO marcador É o modelo:\n  haiku para tarefas mecânicas rápidas\n  sonnet para lógica de negócios, serviços, testes\n  opus para arquitetura, multi-sistema\n\nO marcador mais alto no prompt vence. Adicione model: \"%s\" à chamada Agent."
audit.block_agent_wrong_model: "Incompatibilidade de modelo no despacho de worker de plano.\n\nMarcadores de tarefa encontrados: %s\nModelo necessário: '%s' (marcador mais alto)\nModelo atual:   '%s'\n\nO marcador É o modelo:\n  haiku para tarefas mecânicas rápidas\n  sonnet para lógica de negócios, serviços, testes\n  opus para arquitetura, multi-sistema\n\nCorreção: altere model: \"%s\" → model: \"%s\""

audit.block_bash_redirect_planning: "Redirecionamento Bash para .planning/ detectado. Use a ferramenta Write.\n\nSe estiver escrevendo um plano, leia ~/.claude/references/plan/plan-template.md primeiro.\nSe estiver escrevendo um relatório, use .planning/reports/ (sem template necessário).\nSe estiver escrevendo um item de backlog, use: bravros backlog"

audit.block_lock_tamper_bash: "Excluir ou adulterar .auto-pr-lock está BLOQUEADO.\n\nO arquivo de lock é gerenciado pelo ciclo de vida do pipeline autônomo.\nÉ criado quando /auto-pr inicia e removido quando completa.\nA exclusão manual não contornará o portão de mesclagem para main — o estado da sessão é persistente."
audit.block_lock_tamper_write: "Escrever em .auto-pr-lock está BLOQUEADO.\nApenas /auto-pr e /auto-pr-wt gerenciam este arquivo."

audit.block_debug_readonly: "Modificação de arquivo BLOQUEADA — /debug é uma skill de investigação somente leitura.\n\n/debug investiga e diagnostica. NÃO corrige.\nEscolha um caminho para a correção:\n\n  /quick    — Correção pequena e óbvia (1-2 arquivos). Corrija e faça commit imediatamente.\n  /backlog  — Capture para depois. Cria um item de backlog com contexto de debug.\n  /plan     — Correção complexa. Cria um plano com todas as descobertas do debug como contexto.\n\nApresente essas opções ao usuário via AskUserQuestion.\nInclua sua análise de causa raiz e direção de correção na transferência."

audit.block_deployed_dir_write: "Escrever em ~/.claude/ está BLOQUEADO — este é o local implantado.\n\nTodas as edições devem ter como alvo o repositório portátil:\n  ~/.claude/skills/  →  %s/skills/\n  ~/.claude/hooks/   →  %s/hooks/\n\nApós editar, execute: bash install.sh para implantar.\nO repositório portátil é commitado no git. ~/.claude/ é efêmero."

