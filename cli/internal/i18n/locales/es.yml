audit.prefix_stop: "✋🏽Detener: %s"
audit.prefix_warning: "⚠️ Advertencia: %s"

audit.block_skill_read_first: "Se intentó modificar '%s' sin leer SKILL.md primero. Lea ~/.claude/skills/%s/SKILL.md antes de continuar."

audit.warn_team_no_execution_read: "Creando equipo '%s' sin leer team-execution.md primero. Lea ~/.claude/references/plan/team-execution.md para la estrategia de delegación."
audit.warn_standalone_tasks: "Llamada Task independiente #%d en esta sesión — NO se detectó TeamCreate. team-execution.md requiere TeamCreate para 3+ tareas. Dijo que usaría equipos. ¿Mintió?"

audit.warn_merge_without_ask: "Segundo gh pr merge durante /finish sin AskUserQuestion. El Paso 6 requiere preguntar al usuario antes de fusionar homolog → main."
audit.warn_pr_create_outside_context: "gh pr create llamado fuera del contexto /pr, /finish o /hotfix. Los PRs solo deben crearse mediante estas skills. Contexto activo: '%s'"

audit.block_plan_no_template: "Creando nuevo archivo de plan sin leer plan-template.md primero.\nLea ~/.claude/references/plan/plan-template.md antes de crear planes."

audit.block_workflow_no_homolog: "Creando '%s' pero este proyecto no tiene rama homolog.\n\nLos workflows de GitHub (claude.yml, tests.yml) son solo para proyectos que usan\nel flujo PR homolog → main. Sin homolog, no hay pipeline de PR para ejecutar CI.\n\nSi este proyecto debe usar el flujo homolog, cree la rama homolog primero:\n  git checkout -b homolog && git push -u origin homolog"

audit.block_test_not_parallel: "Forma incorrecta de ejecutar el conjunto de pruebas completo.\n\nDEBE ejecutarlo en paralelo con 10 procesos — de lo contrario tarda 40+ minutos:\n\n  Conjunto completo:  ./vendor/bin/pest --parallel --processes=10\n  Con cobertura:      herd coverage ./vendor/bin/pest --coverage --parallel --processes=10\n\nDisponibles como alias de shell:\n  ptp   →  ./vendor/bin/pest --parallel --processes=10\n  tcq   →  herd coverage ./vendor/bin/pest --coverage --parallel --processes=10\n\nPruebas dirigidas (siempre preferidas por velocidad):\n  vendor/bin/pest --filter=\"TestName\"\n  vendor/bin/pest tests/Feature/Path/ToTest.php\n  herd coverage vendor/bin/pest --coverage --filter=\"TestName\""

audit.warn_task_deletion_edit: "🚨 ELIMINACIÓN DE TAREA DEL PLAN DETECTADA: %d tarea(s) sin completar eliminada(s) de '%s'.\n   Antes: %d tareas (%d sin completar) → Después: %d tareas (%d sin completar)\n   DEBE implementar las tareas planificadas, no eliminarlas. Si una tarea ya no es necesaria, márquela como [x] OMITIDA con motivo.\n   Confiar pero VERIFICAR — esta edición parece una omisión deliberada."
audit.warn_task_deletion_write: "🚨 ELIMINACIÓN DE TAREA DEL PLAN DETECTADA: %d tarea(s) desaparecieron de '%s'.\n   Antes: %d tareas (%d sin completar) → Después: %d tareas (%d sin completar)\n   %d tarea(s) sin completar fueron eliminadas — estas deben implementarse, no eliminarse.\n   Si las tareas genuinamente no son necesarias, márquelas como [x] OMITIDAS con motivo."

audit.block_migrate_fresh: "migrate:fresh está BLOQUEADO — elimina todas las tablas y destruye los datos.\nUse 'php artisan migrate' para migraciones normales.\n\nSi necesita migrate:fresh para consolidación de migraciones, invoque /squash-migrations primero.\nEsa skill desbloquea migrate:fresh para la sesión.\n\nSi realmente lo necesita fuera de ese contexto, pida al usuario que lo ejecute manualmente."
audit.warn_migrate_fresh_allowed: "migrate:fresh PERMITIDO — skill /squash-migrations está activa.\nEsto es esperado durante la consolidación de migraciones. Proceda con precaución."
audit.warn_migrate_fresh_deployed: "ADVERTENCIA: migrate:fresh en un proyecto desplegado. Proceda con extrema precaución."
audit.block_destructive_db: "%s está BLOQUEADO — este proyecto tiene env.deployed: true en .bravros.yml.\nLos comandos destructivos de base de datos no están permitidos en proyectos desplegados.\nSi es realmente necesario, pida al usuario que lo ejecute manualmente o establezca env.deployed: false."
audit.block_push_main: "El push directo a main está BLOQUEADO.\nUse el flujo de rama: feature/* → %s → main (via PR).\nEn emergencia, use /hotfix que crea un PR adecuado."
audit.block_ai_sig_commit: "Las firmas de IA están BLOQUEADAS en commits.\nEliminar cualquier Co-Authored-By, 'Generated by AI' o atribución similar.\nEl hook commit-msg también rechazará estas, pero es mejor detectarlo temprano."
audit.block_ai_sig_pr: "Las firmas de IA están BLOQUEADAS en pull requests.\nEliminar cualquier 'Generated with Claude Code', 'Co-Authored-By', '🤖 Generated',\no cualquier atribución de IA del título y cuerpo del PR.\nPatrón encontrado: %s"
audit.block_ai_sig_comment: "Las firmas de IA están BLOQUEADAS en comentarios de PR.\nEliminar cualquier atribución de IA del cuerpo del comentario.\nPatrón encontrado: %s"

audit.block_review_too_short: "El comentario @claude review es demasiado corto — los agentes deben usar el prompt completo.\n\nCuerpo del comentario requerido:\n  \"@claude review this PR and check if we are able to merge. Analyze the code changes for any issues, security concerns, or improvements needed.\"\n\nEsto garantiza que el revisor de CI realice un análisis completo, no superficial."

audit.block_plan_check_skip: "Creación de PR sin /plan-check.\n\nEstá dentro de un flujo SDLC — /plan-check es obligatorio antes de crear un PR.\nEjecute /plan-check primero para auditar la implementación contra el plan.\n\nSi es trabajo ad-hoc (sin plan), use /pr directamente fuera de los flujos SDLC."
audit.warn_plan_check_skip: "Creando PR después de /plan-approved pero /plan-check nunca fue ejecutado.\n/plan-check es el control de calidad — audita código vs plan, encuentra pruebas huérfanas\ny crea el commit de auditoría. Ejecute /plan-check antes de /pr."

audit.block_unchecked_acceptance: "Criterios de aceptación sin verificar en el archivo de plan.\n\nSu plan tiene %d/%d elementos sin verificar en la sección de Aceptación de '%s'.\nEjecute /plan-check para auditar y marcar los criterios de aceptación completados."
audit.warn_unchecked_acceptance: "El PR tiene %d/%d criterios de aceptación sin verificar en '%s'.\n/plan-check debe verificar y marcar cada criterio antes de crear el PR.\nEjecute /plan-check o verifique y marque manualmente los criterios de aceptación."

audit.block_autopr_skip_plancheck: "auto-pr: Creando PR sin ejecutar el Paso 5 (plan-check).\n\nEl pipeline auto-pr requiere TODOS los pasos en orden:\n  1. Inicializar → 2. Plan → 3. Revisar → 4. Ejecutar → 5. Verificar Plan → 6. PR → 7. Bucle de Revisión → 8. Informe\n\nOmitió el Paso 5 (auditando implementación). Ejecútelo ahora:\n  echo \"🤖 [auto-pr:5] auditando implementación\"\n  bravros context --diffs\n  # ... compare plan vs implementación, corrija discrepancias\n  bravros sync"
audit.warn_autopr_skip_review: "auto-pr: Publicando informe final sin ejecutar el Paso 7 (bucle de revisión).\n\nEl bucle de revisión es obligatorio — active @claude review en el PR:\n  echo \"🤖 [auto-pr:7] iniciando bucle de revisión\"\n  gh pr comment $PR_NUM --body \"@claude review this PR\"\n\nSi la GitHub Action no está configurada, espere 5 min y continúe.\nDEBE al menos intentar el paso de revisión."

audit.block_backlog_manual: "El análisis manual de archivos de backlog está BLOQUEADO.\n\nUse el CLI — maneja correctamente formatos YAML y legado:\n\n  bravros backlog                  # Salida JSON (predeterminado)\n  bravros backlog --format table   # Tabla formateada\n  bravros backlog --archive        # Incluir elementos archivados\n  bravros backlog migrate           # Convertir formato antiguo → YAML\n\nNunca analice archivos de backlog con grep/sed/awk/cat — el CLI es más rápido y correcto."

audit.block_planning_mv: "Use 'git mv' en lugar de 'mv' para archivos .planning/ para preservar el historial de git"

audit.block_main_merge_autonomous: "Fusionar a main NO está permitido en modo autónomo.\n\nLos pipelines autónomos (/auto-pr, /auto-pr-wt, /auto-merge) pueden fusionar a\ncualquier rama EXCEPTO main. Las fusiones a main requieren aprobación humana via /finish.\n\nQué debe hacer:\n  1. Crear el PR apuntando a main (permitido)\n  2. Publicar un comentario de recomendación en el PR\n  3. Detenerse y dejar que el usuario ejecute /finish para fusionar\n\nMain siempre es decisión del usuario. Esto es innegociable."
audit.block_main_merge: "Fusionar a main está BLOQUEADO fuera de los contextos de skill permitidos.\n\nContextos permitidos: /finish, /hotfix\n\nPara fusionar a main:\n  1. Use /finish para completar la feature y fusionar via PR\n  2. Use /hotfix para despliegues de emergencia\n\nRama de staging: %s\nEsta puerta previene fusiones no autorizadas a producción."

audit.warn_no_config: "No se encontró .bravros.yml en este proyecto.\n\nEjecute: bravros detect-stack --write\n\nEsto detecta automáticamente su stack y genera .bravros.yml con el esquema completo:\n  staging_branch, stack (language, framework, test_runner, has_assets),\n  git (remote, has_ci, ci_workflow), env (deployed, production, staging, local).\n\nTodas las skills y reglas de auditoría leen de este archivo — generarlo una vez evita\nla detección repetida de stack y habilita protecciones de entorno desplegado."

audit.block_agent_no_model: "Agent despachando tareas del plan sin el parámetro model: definido.\n\nMarcadores de tarea encontrados en el prompt: %s\nModelo requerido: '%s'\n\nEl marcador ES el modelo:\n  haiku para tareas mecánicas rápidas\n  sonnet para lógica de negocio, servicios, pruebas\n  opus para arquitectura, multi-sistema\n\nEl marcador más alto en el prompt gana. Agregue model: \"%s\" a la llamada Agent."
audit.block_agent_wrong_model: "Discrepancia de modelo en el despacho de worker de plan.\n\nMarcadores de tarea encontrados: %s\nModelo requerido: '%s' (marcador más alto)\nModelo actual:   '%s'\n\nEl marcador ES el modelo:\n  haiku para tareas mecánicas rápidas\n  sonnet para lógica de negocio, servicios, pruebas\n  opus para arquitectura, multi-sistema\n\nCorreción: cambie model: \"%s\" → model: \"%s\""

audit.block_bash_redirect_planning: "Redirección Bash a .planning/ detectada. Use la herramienta Write.\n\nSi está escribiendo un plan, lea ~/.claude/references/plan/plan-template.md primero.\nSi está escribiendo un informe, use .planning/reports/ (sin plantilla requerida).\nSi está escribiendo un elemento de backlog, use: bravros backlog"

audit.block_lock_tamper_bash: "Eliminar o manipular .auto-pr-lock está BLOQUEADO.\n\nEl archivo de bloqueo es gestionado por el ciclo de vida del pipeline autónomo.\nSe crea cuando /auto-pr inicia y se elimina cuando completa.\nLa eliminación manual no omitirá el control de fusión a main — el estado de sesión es persistente."
audit.block_lock_tamper_write: "Escribir en .auto-pr-lock está BLOQUEADO.\nSolo /auto-pr y /auto-pr-wt administran este archivo."

audit.block_debug_readonly: "Modificación de archivo BLOQUEADA — /debug es una skill de investigación de solo lectura.\n\n/debug investiga y diagnostica. NO corrige.\nElija un camino para la corrección:\n\n  /quick    — Corrección pequeña y obvia (1-2 archivos). Corregir y hacer commit inmediatamente.\n  /backlog  — Capturar para después. Crea un elemento de backlog con contexto de debug.\n  /plan     — Corrección compleja. Crea un plan con todos los hallazgos del debug como contexto.\n\nPresente estas opciones al usuario via AskUserQuestion.\nIncluja su análisis de causa raíz y dirección de corrección en la transferencia."

audit.block_deployed_dir_write: "Escribir en ~/.claude/ está BLOQUEADO — esta es la ubicación desplegada.\n\nTodas las ediciones deben apuntar al repositorio portátil:\n  ~/.claude/skills/  →  %s/skills/\n  ~/.claude/hooks/   →  %s/hooks/\n\nDespués de editar, ejecute: bash install.sh para desplegar.\nEl repositorio portátil está comprometido en git. ~/.claude/ es efímero."
