audit.prefix_stop: "✋🏽Stop: %s"
audit.prefix_warning: "⚠️ Warning: %s"

audit.block_skill_read_first: "Tried to modify '%s' without reading SKILL.md first. Read ~/.claude/skills/%s/SKILL.md before proceeding."

audit.warn_team_no_execution_read: "Creating team '%s' without reading team-execution.md first. Read ~/.claude/references/plan/team-execution.md for delegation strategy."
audit.warn_standalone_tasks: "Standalone Task call #%d in this session — NO TeamCreate detected. team-execution.md requires TeamCreate for 3+ tasks. You said you'd use teams. Did you lie?"

audit.warn_merge_without_ask: "Second gh pr merge during /finish without AskUserQuestion. Step 6 requires asking the user before merging homolog → main."
audit.warn_pr_create_outside_context: "gh pr create called outside /pr, /finish, or /hotfix context. PRs should only be created via these skills. Active context: '%s'"

audit.block_plan_no_template: "Creating new plan file without reading plan-template.md first.\nRead ~/.claude/references/plan/plan-template.md before creating plans."

audit.block_workflow_no_homolog: "Creating '%s' but this project has no homolog branch.\n\nGitHub workflows (claude.yml, tests.yml) are only for projects using the\nhomolog → main PR flow. Without homolog, there's no PR pipeline to run CI on.\n\nIf this project should use the homolog flow, create the homolog branch first:\n  git checkout -b homolog && git push -u origin homolog"

audit.block_test_not_parallel: "Wrong way to run the full test suite.\n\nYou MUST run it in parallel with 10 processes — otherwise it takes 40+ minutes:\n\n  Full suite:     ./vendor/bin/pest --parallel --processes=10\n  With coverage:  herd coverage ./vendor/bin/pest --coverage --parallel --processes=10\n\nThese are available as shell aliases:\n  ptp   →  ./vendor/bin/pest --parallel --processes=10\n  tcq   →  herd coverage ./vendor/bin/pest --coverage --parallel --processes=10\n\nTargeted tests (always preferred for speed):\n  vendor/bin/pest --filter=\"TestName\"\n  vendor/bin/pest tests/Feature/Path/ToTest.php\n  herd coverage vendor/bin/pest --coverage --filter=\"TestName\""

audit.warn_task_deletion_edit: "🚨 PLAN TASK DELETION DETECTED: %d unchecked task(s) removed from '%s'.\n   Before: %d tasks (%d unchecked) → After: %d tasks (%d unchecked)\n   You MUST implement planned tasks, not delete them. If a task is no longer needed, mark it [x] SKIPPED with reason.\n   Trust but CHECK — this edit looks like lying by omission."
audit.warn_task_deletion_write: "🚨 PLAN TASK DELETION DETECTED: %d task(s) disappeared from '%s'.\n   Before: %d tasks (%d unchecked) → After: %d tasks (%d unchecked)\n   %d unchecked task(s) were removed — these should be implemented, not deleted.\n   If tasks are genuinely not needed, mark them [x] SKIPPED with reason."

audit.block_migrate_fresh: "migrate:fresh is BLOCKED — it drops all tables and destroys data.\nUse 'php artisan migrate' for normal migrations.\n\nIf you need migrate:fresh for migration consolidation, invoke /squash-migrations first.\nThat skill unlocks migrate:fresh for the session.\n\nIf you truly need it outside that context, ask the user to run it manually."
audit.warn_migrate_fresh_allowed: "migrate:fresh ALLOWED — /squash-migrations skill is active.\nThis is expected during migration consolidation. Proceed with caution."
audit.warn_migrate_fresh_deployed: "WARNING: migrate:fresh on a deployed project. Proceed with extreme caution."
audit.block_destructive_db: "%s is BLOCKED — this project has env.deployed: true in .bravros.yml.\nDestructive database commands are not allowed on deployed projects.\nIf this is truly needed, ask the user to run it manually or set env.deployed: false."
audit.block_push_main: "Direct push to main is BLOCKED.\nUse the branch flow: feature/* → %s → main (via PR).\nIf this is an emergency, use /hotfix which creates a proper PR."
audit.block_ai_sig_commit: "AI signatures are BLOCKED in commits.\nRemove any Co-Authored-By, 'Generated by AI', or similar attribution.\nThe commit-msg hook will also reject these, but catching it early."
audit.block_ai_sig_pr: "AI signatures are BLOCKED in pull requests.\nRemove any 'Generated with Claude Code', 'Co-Authored-By', '🤖 Generated',\nor any AI attribution from the PR title and body.\nMatched pattern: %s"
audit.block_ai_sig_comment: "AI signatures are BLOCKED in PR comments.\nRemove any AI attribution from the comment body.\nMatched pattern: %s"

audit.block_review_too_short: "@claude review comment is too short — agents must use the full prompt.\n\nRequired comment body:\n  \"@claude review this PR and check if we are able to merge. Analyze the code changes for any issues, security concerns, or improvements needed.\"\n\nThis ensures the CI reviewer performs a thorough analysis, not a superficial pass."

audit.block_plan_check_skip: "PR creation without /plan-check.\n\nYou are inside an SDLC flow — /plan-check is mandatory before creating a PR.\nRun /plan-check first to audit the implementation against the plan.\n\nIf this is ad-hoc work (no plan), use /pr directly outside of SDLC flows."
audit.warn_plan_check_skip: "Creating PR after /plan-approved but /plan-check was never run.\n/plan-check is the quality gate — it audits code vs plan, catches orphaned tests,\nand creates the audit commit. Run /plan-check before /pr."

audit.block_unchecked_acceptance: "Unchecked acceptance criteria in plan file.\n\nYour plan has %d/%d unchecked items in the Acceptance section of '%s'.\nRun /plan-check to audit and check off completed acceptance criteria."
audit.warn_unchecked_acceptance: "PR has %d/%d unchecked acceptance criteria in '%s'.\n/plan-check should verify and mark each criterion before creating the PR.\nRun /plan-check or manually verify and check off the acceptance criteria."

audit.block_autopr_skip_plancheck: "auto-pr: Creating PR without running Step 5 (plan-check).\n\nThe auto-pr pipeline requires ALL steps in order:\n  1. Initialize → 2. Plan → 3. Review → 4. Execute → 5. Plan Check → 6. PR → 7. Review Loop → 8. Report\n\nYou skipped Step 5 (auditing implementation). Run it now:\n  echo \"🤖 [auto-pr:5] auditing implementation\"\n  bravros context --diffs\n  # ... compare plan vs implementation, fix mismatches\n  bravros sync"
audit.warn_autopr_skip_review: "auto-pr: Posting final report without running Step 7 (review loop).\n\nThe review loop is mandatory — trigger @claude review on the PR:\n  echo \"🤖 [auto-pr:7] starting review loop\"\n  gh pr comment $PR_NUM --body \"@claude review this PR\"\n\nIf the GitHub Action is not set up, poll for 5 min then continue.\nYou MUST at least attempt the review step."

audit.block_backlog_manual: "Manual backlog file parsing is BLOCKED.\n\nUse the CLI instead — it handles both YAML and legacy formats correctly:\n\n  bravros backlog                  # JSON output (default)\n  bravros backlog --format table   # Pretty table\n  bravros backlog --archive        # Include archived items\n  bravros backlog migrate           # Convert old format → YAML\n\nNever parse backlog files with grep/sed/awk/cat — the CLI is faster and correct."

audit.block_planning_mv: "Use 'git mv' instead of 'mv' for .planning/ files to preserve git history"

audit.block_main_merge_autonomous: "Merging to main is NOT allowed in autonomous mode.\n\nAutonomous pipelines (/auto-pr, /auto-pr-wt, /auto-merge) can merge to\nany branch EXCEPT main. Main merges require human approval via /finish.\n\nWhat you should do:\n  1. Create the PR targeting main (allowed)\n  2. Post a recommendation comment on the PR\n  3. Stop and let the user run /finish to merge\n\nMain is always the user's decision. This is non-negotiable."
audit.block_main_merge: "Merging to main is BLOCKED outside of allowed skill contexts.\n\nAllowed contexts: /finish, /hotfix\n\nTo merge to main:\n  1. Use /finish to complete the feature and merge via PR\n  2. Use /hotfix for emergency deployments\n\nStaging branch: %s\nThis gate prevents unauthorized merges to production."

audit.warn_no_config: "No .bravros.yml found in this project.\n\nRun: bravros detect-stack --write\n\nThis auto-detects your stack and generates .bravros.yml with the full schema:\n  staging_branch, stack (language, framework, test_runner, has_assets),\n  git (remote, has_ci, ci_workflow), env (deployed, production, staging, local).\n\nAll skills and audit rules read from this file — generating it once avoids\nrepeated stack detection and enables deployed-environment protections."

audit.block_agent_no_model: "Agent dispatching plan tasks without model: parameter set.\n\nTask markers found in prompt: %s\nRequired model: '%s'\n\nThe marker IS the model:\n  haiku for fast mechanical tasks\n  sonnet for business logic, services, tests\n  opus for architecture, multi-system\n\nHighest marker in prompt wins. Add model: \"%s\" to the Agent call."
audit.block_agent_wrong_model: "Model mismatch on plan worker dispatch.\n\nTask markers found: %s\nRequired model: '%s' (highest marker)\nActual model:   '%s'\n\nThe marker IS the model:\n  haiku for fast mechanical tasks\n  sonnet for business logic, services, tests\n  opus for architecture, multi-system\n\nFix: change model: \"%s\" → model: \"%s\""

audit.block_bash_redirect_planning: "Bash redirect write to .planning/ detected. Use the Write tool instead.\n\nIf writing a plan, read ~/.claude/references/plan/plan-template.md first.\nIf writing a report, use .planning/reports/ (no template required).\nIf writing a backlog item, use: bravros backlog"

audit.block_lock_tamper_bash: "Deleting or tampering with .auto-pr-lock is BLOCKED.\n\nThe lock file is managed by the autonomous pipeline lifecycle.\nIt is created when /auto-pr starts and removed when it completes.\nManual deletion will not bypass the main merge gate — session state is sticky."
audit.block_lock_tamper_write: "Writing to .auto-pr-lock is BLOCKED.\nOnly /auto-pr and /auto-pr-wt manage this file."

audit.block_debug_readonly: "File modification BLOCKED — /debug is a read-only investigation skill.\n\n/debug investigates and diagnoses. It does NOT fix.\nChoose a path for the fix:\n\n  /quick    — Small, obvious fix (1-2 files). Fix and commit immediately.\n  /backlog  — Capture for later. Creates a backlog item with debug context.\n  /plan     — Complex fix. Creates a plan with all debug findings as context.\n\nPresent these options to the user via AskUserQuestion.\nInclude your root cause analysis and fix direction in the handoff."

audit.block_deployed_dir_write: "Writing to ~/.claude/ is BLOCKED — this is the deployed location.\n\nAll edits must target the portable repo instead:\n  ~/.claude/skills/  →  %s/skills/\n  ~/.claude/hooks/   →  %s/hooks/\n\nAfter editing, run: bash install.sh to deploy.\nThe portable repo is committed to git. ~/.claude/ is ephemeral."

